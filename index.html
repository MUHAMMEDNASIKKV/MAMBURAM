<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PG MAMBURAM QUOTA</title>
    <!-- Tailwind + Font Awesome + Google Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Inter', sans-serif; }
        body { background: #f8fafc; }
        .card-modern {
            background: white;
            border-radius: 28px;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.08);
            transition: all 0.2s;
        }
        .input-field {
            width: 100%;
            padding: 0.85rem 1rem;
            border: 1.5px solid #e2e8f0;
            border-radius: 18px;
            transition: all 0.2s;
            background: #fff;
            font-size: 0.95rem;
        }
        .input-field:focus {
            outline: none;
            border-color: #0f3b2c;
            box-shadow: 0 0 0 3px rgba(15,59,44,0.1);
        }
        .input-field:read-only {
            background-color: #f3f4f6;
            cursor: not-allowed;
        }
        .department-card {
            border: 2px solid #e9ecef;
            border-radius: 24px;
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            background: #ffffff;
            text-align: center;
        }
        .department-card.selected {
            border-color: #0f3b2c;
            background: #f0f9f4;
            box-shadow: 0 8px 20px rgba(15,59,44,0.12);
        }
        .department-card.highlight {
            border-color: #0f3b2c;
            background: #f0f9f4;
        }
        .department-card.disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: #f1f5f9;
        }
        .slot-badge {
            font-size: 0.75rem;
            font-weight: 600;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            background: #f1f5f9;
            color: #1e293b;
        }
        .slot-full {
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }
        .alert-popup {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #dc2626;
            color: white;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: 600;
            box-shadow: 0 10px 25px -5px rgba(220,38,38,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            font-size: 0.9rem;
            white-space: nowrap;
        }
        .alert-popup.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        @media (max-width: 640px) {
            .alert-popup { white-space: normal; width: 90%; text-align: center; font-size: 0.85rem; }
            .department-card { padding: 0.8rem; }
        }
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .status-submitted {
            background: #d1fae5;
            color: #065f46;
        }
        .status-not-submitted {
            background: #fee2e2;
            color: #991b1b;
        }
        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #0f3b2c;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .department-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.75rem;
        }
        .note-text {
            font-size: 0.85rem;
            color: #6b7280;
            padding: 0.5rem 1rem;
            background: #f0fdf4;
            border-radius: 12px;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-6">

    <!-- MAIN PORTAL CARD -->
    <div class="max-w-xl w-full mx-auto card-modern p-5 md:p-8 transition-all">
        <div class="text-center mb-6">
            <h1 class="text-2xl md:text-3xl font-extrabold text-gray-800">MAMBURAM QUOTA</h1>
            
            <div class="h-1 w-20 bg-emerald-700 mx-auto rounded-full mt-3"></div>
        </div>

        <!-- Student Info Form -->
        <div class="space-y-5">
            <!-- Enrol No -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-id-card mr-2 text-emerald-700"></i>Enrolment Number
                </label>
                <input type="text" id="enrolNo" class="input-field" placeholder="Enter your enrolment number (e.g., 16074)" autocomplete="off">
                <p id="enrolError" class="text-xs text-red-500 mt-1 hidden"></p>
            </div>

            <!-- Name (auto from data) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-user mr-2 text-emerald-700"></i>Full Name
                </label>
                <input type="text" id="studentName" class="input-field" readonly placeholder="Will appear automatically">
            </div>

            <!-- Department (auto from data) -->
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-building mr-2 text-emerald-700"></i>Your Department
                </label>
                <input type="text" id="studentDepartment" class="input-field" readonly placeholder="Will appear automatically">
            </div>

            <!-- Status -->
            <div id="statusContainer" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-1">
                    <i class="fas fa-info-circle mr-2 text-emerald-700"></i>Registration Status
                </label>
                <div id="statusDisplay" class="input-field"></div>
            </div>

            <!-- Department Selection (only for user's department) -->
            <div id="selectionContainer" class="hidden">
                <label class="block text-sm font-semibold text-gray-700 mb-2">
                    <i class="fas fa-check-circle mr-2 text-emerald-700"></i>Confirm Your Department Registration
                </label>
                <div class="note-text mb-3">
                    <i class="fas fa-info-circle mr-1"></i> Only 6 slots available per department. First come, first served.
                </div>
                <div id="departmentContainer" class="department-grid mt-2">
                    <!-- Single department card injected -->
                </div>
                <div id="departmentSlotInfo" class="text-xs text-gray-500 mt-2"></div>
            </div>

            <!-- Submit Button -->
            <button id="submitBtn" class="w-full bg-emerald-800 hover:bg-emerald-900 text-white font-bold py-3 rounded-2xl transition-all shadow-md flex items-center justify-center gap-2 text-lg mt-4">
                <i class="fas fa-check-circle"></i> Confirm Registration
            </button>
        </div>

        <!-- Footer note -->
        <div class="mt-8 text-center text-xs text-gray-400 border-t pt-5">
            <i class="fas fa-clock mr-1"></i> Each department has 6 slots on first-come-first-serve basis.
        </div>
    </div>

    <!-- global alert popup -->
    <div id="alertPopup" class="alert-popup">Message</div>

    <script src="app.js"></script>
</body>
</html>
